name: CarbonChain CI/CD

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --force

      - run: npx hardhat compile

      - run: npx hardhat test
